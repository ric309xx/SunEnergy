<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sun Energy - 內容管理系統</title>
    <!-- 引入 Netlify Identity Widget，這是登入後台的關鍵 -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
        /* 客製化 Decap CMS 首頁儀表板的選單卡片，解決預設空白的問題 */
        a[href*="entries/cases"] {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364) !important;
            color: white !important;
            border-radius: 12px !important;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15) !important;
            border: none !important;
        }

        a[href*="entries/cases"] h2 {
            color: #ffc107 !important;
        }

        a[href*="entries/cases"]::after {
            content: "📸 管理所有的太陽能實績案場、相片與 YouTube 影片";
            display: block;
            margin-top: 15px;
            font-size: 14px;
            color: #e2e8f0;
            line-height: 1.5;
        }

        a[href*="entries/news"] {
            background: linear-gradient(135deg, #1e3c72, #2a5298) !important;
            color: white !important;
            border-radius: 12px !important;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15) !important;
            border: none !important;
        }

        a[href*="entries/news"] h2 {
            color: #64b5f6 !important;
        }

        a[href*="entries/news"]::after {
            content: "📰 發布最新的綠能相關動態、最新消息與活動紀錄";
            display: block;
            margin-top: 15px;
            font-size: 14px;
            color: #e2e8f0;
            line-height: 1.5;
        }
    </style>
</head>

<body>
    <!-- 引入 Decap CMS 核心程式 -->
    <script src="https://unpkg.com/decap-cms@^3.1.2/dist/decap-cms.js"></script>
    <script>
        // 載入主網站的 CSS 到預覽視窗中
        CMS.registerPreviewStyle("../css/style.css");

        // 定義自訂預覽元件
        var SiteContentPreview = createClass({
            render: function () {
                var entry = this.props.entry;
                var file = entry.get('slug'); // 取得目前是編輯哪個檔案 (news 或 cases)
                var items = entry.getIn(['data', 'items']); // 取得列表資料

                if (!items) {
                    return h('div', { style: { padding: '40px', color: '#fff', background: '#0a192f', minHeight: '100vh' } }, "正在建立新資料...");
                }

                if (file === 'news') {
                    return h('div', { className: 'news-grid', style: { padding: '40px', background: '#0a192f', minHeight: '100vh' } },
                        items.map(function (item, index) {
                            var img = this.props.getAsset(item.get('img'));
                            var source = item.get('source');
                            var isSchematic = item.get('is_schematic');
                            var schematicClass = isSchematic ? 'schematic' : '';
                            var sourceHTML = source ? h('span', { className: 'image-source' }, '圖片來源：' + source) : null;

                            return h('div', { className: 'news-card', key: index, style: { pointerEvents: 'none' } },
                                h('div', { className: 'news-header' },
                                    h('span', { className: 'news-date' }, item.get('date') ? item.get('date').toString() : ''),
                                    h('span', { className: 'news-tag' }, item.get('tag'))
                                ),
                                h('div', { className: 'news-body' },
                                    h('h3', { className: 'news-title' }, item.get('title')),
                                    h('p', { className: 'news-desc' }, item.get('text'))
                                ),
                                h('div', { className: 'news-image' },
                                    h('div', { className: 'schematic-wrapper ' + schematicClass },
                                        img ? h('img', { src: img.toString() }) : null
                                    ),
                                    sourceHTML
                                )
                            );
                        }.bind(this)).toArray()
                    );
                } else if (file === 'cases') {
                    return h('div', { className: 'cases-grid reveal active', style: { padding: '40px', background: '#0a192f', minHeight: '100vh', opacity: 1, transform: 'none' } },
                        items.map(function (item, index) {
                            var img = this.props.getAsset(item.get('image'));
                            var isSchematic = item.get('is_schematic');
                            var schematicClass = isSchematic ? 'schematic' : '';

                            return h('div', { className: 'case-card', key: index, style: { pointerEvents: 'none' } },
                                h('div', { className: 'case-thumb' },
                                    h('div', { className: 'schematic-wrapper ' + schematicClass },
                                        img ? h('img', { src: img.toString() }) : null
                                    ),
                                    h('div', { className: 'case-overlay' },
                                        h('span', null, '查看詳情')
                                    )
                                ),
                                h('div', { className: 'case-info' },
                                    h('h3', null, item.get('title')),
                                    h('p', { className: 'case-brief' }, item.get('brief')),
                                    h('button', { className: 'btn-text text-small' }, '了解更多 →')
                                )
                            );
                        }.bind(this)).toArray()
                    );
                }

                return h('div', null, "未知的預覽格式");
            }
        });

        // 將自訂預覽套用至 site_content 群組
        CMS.registerPreviewTemplate("site_content", SiteContentPreview);
    </script>
</body>

</html>
